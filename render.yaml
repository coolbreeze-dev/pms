services:
  - type: web
    name: household-portfolio-tracker
    runtime: docker
    plan: free
    dockerfilePath: ./ops/Dockerfile
    dockerContext: .
    healthCheckPath: /api/ready
    envVars:
      - key: PORTFOLIO_DB_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: ""
      - key: ALLOWED_HOSTS
        value: "*"
      - key: FORCE_HTTPS
        value: "true"
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: BROKERAGE_SYNC_PROVIDER
        value: disabled
