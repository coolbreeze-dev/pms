services:
  app:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORTFOLIO_DB_URL: sqlite:////data/portfolio.db
      PORT: 8000
    volumes:
      - portfolio_data:/data
    expose:
      - "8000"

  litestream:
    image: litestream/litestream:0.5
    restart: unless-stopped
    env_file:
      - .env.production
    command: ["replicate", "-config", "/etc/litestream.yml"]
    volumes:
      - ./litestream.yml:/etc/litestream.yml:ro
      - portfolio_data:/data
    depends_on:
      - app

  restore:
    image: litestream/litestream:0.5
    profiles: ["ops"]
    env_file:
      - .env.production
    command: ["restore", "-config", "/etc/litestream.yml", "-if-replica-exists", "-o", "/data/portfolio.db"]
    volumes:
      - ./litestream.yml:/etc/litestream.yml:ro
      - portfolio_data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  portfolio_data:
  caddy_data:
  caddy_config:
